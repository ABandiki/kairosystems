version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: kairo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kairo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kairo_secure_password}
      POSTGRES_DB: ${POSTGRES_DB:-kairo}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Port 5432 NOT exposed externally - only accessible via Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kairo} -d ${POSTGRES_DB:-kairo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kairo-network

  # NestJS Backend API
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: kairo-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-kairo}:${POSTGRES_PASSWORD:-kairo_secure_password}@postgres:5432/${POSTGRES_DB:-kairo}?schema=public
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      # Email (SMTP) configuration
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Kairo}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      # SMS (Twilio) configuration
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
    # Port 3001 NOT exposed externally - only accessible via Nginx reverse proxy
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kairo-network

  # Next.js Frontend
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    container_name: kairo-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-your-nextauth-secret-change-in-production}
    # Port 3000 NOT exposed externally - only accessible via Nginx reverse proxy
    expose:
      - "3000"
    depends_on:
      - api
    networks:
      - kairo-network

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    container_name: kairo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - api
    networks:
      - kairo-network

networks:
  kairo-network:
    driver: bridge

volumes:
  postgres_data:
